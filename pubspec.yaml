name: parallel_paradigm_org
description: "Olympia Lacey Design is technology studio for small and mid-size businesses. We improve growth, monetization, governance, security, and engagement - which compounds profitability and brand strength"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0
dependencies:
  url_launcher: ^6.0.0
  flutter_svg: ^2.0.0
  supabase_flutter: '>=1.10.0'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.2
  go_router: ^16.2.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  # Source-of-truth launcher icon
  image_path: assets/images/Parallel_Paradigm_Black_on_White.png
  remove_alpha_ios: true
