<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Primary SEO -->
  <meta name="description" content="Olympia Lacey Design is technology studio for small and mid-size businesses. We improve growth, monetization, governance, security, and engagement - which compounds profitability and brand strength">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <meta name="theme-color" content="#0B0F17">

  <!-- Social sharing (Open Graph / Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Parallel Paradigm • Olympia Lacey Design">
  <meta property="og:description" content="Olympia Lacey Design is technology studio for small and mid-size businesses. We improve growth, monetization, governance, security, and engagement - which compounds profitability and brand strength">
  <!-- Prefer PNG for link previews (many scrapers don't support SVG reliably). -->
  <meta property="og:image" content="assets/assets/images/Parallel_Paradigm_Black_on_White.png">
  <meta property="og:image:type" content="image/png">
  <!-- Optional SVG fallback for platforms that support it. -->
  <meta property="og:image" content="assets/assets/images/Logo_Parallel_Paradigm_Black.svg">
  <meta property="og:image:type" content="image/svg+xml">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Parallel Paradigm • Olympia Lacey Design">
  <meta name="twitter:description" content="Olympia Lacey Design is technology studio for small and mid-size businesses. We improve growth, monetization, governance, security, and engagement - which compounds profitability and brand strength">
  <meta name="twitter:image" content="assets/assets/images/Parallel_Paradigm_Black_on_White.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Parallel Paradigm">
  <!-- iOS home-screen icon (prefer conventional web/icons so all crawlers agree). -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png?v=pp3">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png?v=pp3">

  <!-- Favicon -->
  <!--
    IMPORTANT:
    Some browsers/crawlers will still probe /favicon.ico or /favicon.png even if a custom <link rel="icon"> exists.
    To avoid them picking up a stale/default Flutter favicon, we explicitly point to web/favicon.png and web/icons/*.
  -->
  <link rel="icon" href="favicon.png?v=pp3" type="image/png">
  <link rel="shortcut icon" href="favicon.png?v=pp3" type="image/png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=pp3"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png?v=pp3"/>
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png?v=pp3"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png?v=pp3"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png?v=pp3"/>

  <title>Parallel Paradigm • Olympia Lacey Design</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured data (helps rich results / knowledge panels) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Parallel Paradigm",
      "description": "Olympia Lacey Design is technology studio for small and mid-size businesses. We improve growth, monetization, governance, security, and engagement - which compounds profitability and brand strength",
      "publisher": {
        "@type": "Person",
        "name": "Olympia Lacey"
      }
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
