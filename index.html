<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Social sharing (Open Graph / Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Olympia Lacey Design • Parallel Paradigm">
  <meta property="og:description" content="A new Flutter project.">
  <!-- Prefer PNG for link previews (many scrapers don't support SVG reliably). -->
  <meta property="og:image" content="assets/assets/images/Parallel_Paradigm_Black_on_White.png">
  <meta property="og:image:type" content="image/png">
  <!-- Optional SVG fallback for platforms that support it. -->
  <meta property="og:image" content="assets/assets/images/Logo_Parallel_Paradigm_Black.svg">
  <meta property="og:image:type" content="image/svg+xml">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Olympia Lacey Design • Parallel Paradigm">
  <meta name="twitter:description" content="A new Flutter project.">
  <meta name="twitter:image" content="assets/assets/images/Parallel_Paradigm_Black_on_White.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="parallel_paradigm_org">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <!-- Chrome tab icon: prefer a PNG favicon. (Even if the source is 512x512, browsers will downscale.) -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/assets/images/Parallel_Paradigm_Black_on_White.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="assets/assets/images/Parallel_Paradigm_Black_on_White.png"/>
  <!-- Optional SVG favicon for browsers that support it. -->
  <link rel="icon" type="image/svg+xml" href="assets/assets/images/Logo_Parallel_Paradigm_Black.svg"/>
  <!-- Additional PNG fallbacks (PWA-style icons) -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png"/>

  <title>Olympia Lacey Design • Parallel Paradigm</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
